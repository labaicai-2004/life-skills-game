<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<title>生活小能手</title>
<style>
:root {
  --bg: #FFF9E6; --card: #FFFFFF;
  --yellow: #FFD93D; --pink: #FF6B9D; --blue: #4D96FF;
  --green: #6BCB77; --text: #5C3D2E; --text-light: #9B7B6B;
  --shadow: 0 6px 24px rgba(0,0,0,0.05); --shadow-lg: 0 10px 40px rgba(0,0,0,0.08);
  --shadow-candy: 0 6px 0 rgba(0,0,0,0.12);
  --radius: 24px;
  --font-xl: clamp(32px,5vw,48px); --font-lg: clamp(24px,4vw,36px);
  --font-md: clamp(18px,3vw,24px); --font-sm: clamp(14px,2vw,18px);
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  font-family: "ZCOOL KuaiLe", "PingFang SC", "Noto Sans SC", sans-serif;
  background: var(--bg);
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  touch-action: manipulation;
}

/* ===== DECORATIVE BACKGROUND ===== */
.deco-clouds { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.cloud {
  position:absolute; background:white; border-radius:50%; opacity:0.55;
  animation: cloudFloat 14s ease-in-out infinite;
}
.cloud::before, .cloud::after {
  content:''; position:absolute; background:white; border-radius:50%;
}
.cloud:nth-child(1) { width:120px; height:50px; top:8%; left:10%; animation-delay:0s; }
.cloud:nth-child(1)::before { width:50px; height:50px; top:-25px; left:20px; }
.cloud:nth-child(1)::after { width:70px; height:45px; top:-15px; left:45px; }
.cloud:nth-child(2) { width:100px; height:42px; top:15%; right:15%; animation-delay:-5s; animation-duration:16s; }
.cloud:nth-child(2)::before { width:45px; height:45px; top:-22px; left:15px; }
.cloud:nth-child(2)::after { width:60px; height:38px; top:-12px; left:40px; }
.cloud:nth-child(3) { width:90px; height:38px; top:5%; left:55%; animation-delay:-9s; animation-duration:18s; }
.cloud:nth-child(3)::before { width:40px; height:40px; top:-20px; left:12px; }
.cloud:nth-child(3)::after { width:55px; height:35px; top:-10px; left:35px; }
@keyframes cloudFloat {
  0%,100% { transform:translateX(0); }
  25% { transform:translateX(25px); }
  75% { transform:translateX(-25px); }
}
.deco-stars { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.deco-star {
  position:absolute; font-size:22px; opacity:0.35;
  animation: starTwinkle 3s ease-in-out infinite;
}
.deco-star:nth-child(1) { top:6%; left:8%; animation-delay:0s; }
.deco-star:nth-child(2) { top:12%; right:10%; animation-delay:-1s; font-size:18px; }
.deco-star:nth-child(3) { top:3%; left:75%; animation-delay:-2s; font-size:26px; }
.deco-star:nth-child(4) { bottom:8%; left:5%; animation-delay:-0.5s; font-size:16px; opacity:0.25; }
.deco-star:nth-child(5) { bottom:12%; right:8%; animation-delay:-1.8s; font-size:20px; opacity:0.3; }
@keyframes starTwinkle {
  0%,100% { opacity:0.25; transform:rotate(0deg) scale(1); }
  50% { opacity:0.5; transform:rotate(180deg) scale(1.3); }
}

/* ===== LOADING SCREEN ===== */
.loading-screen {
  position:fixed; inset:0; z-index:999; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity 0.5s ease;
}
.loading-screen.hidden { opacity:0; pointer-events:none; }
.loading-bar-track {
  width:200px; height:16px; background:rgba(0,0,0,0.06); border-radius:20px; overflow:hidden;
}
.loading-bar-fill {
  height:100%; border-radius:20px;
  background:linear-gradient(90deg,var(--pink),var(--yellow),var(--blue),var(--green));
  background-size:300% 100%;
  animation:rainbowBar 1.5s linear infinite;
}
@keyframes rainbowBar {
  0% { background-position:0% 50%; width:30%; }
  50% { width:80%; }
  100% { background-position:100% 50%; width:30%; }
}
.loading-text { margin-top:16px; font-size:18px; color:var(--text-light); font-weight:700; }

/* ===== SCREENS ===== */
.screen {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.45s ease; padding:20px;
}
.screen.active { opacity:1; pointer-events:auto; }

/* ===== START SCREEN ===== */
.start-bg {
  position:absolute; inset:0;
  background:linear-gradient(180deg,#FFF9E6 0%,#FFF3D6 45%,#FFEDCC 100%); z-index:-1;
}
.title-area { text-align:center; margin-bottom:36px; }
.title-icon { font-size:68px; display:block; margin-bottom:6px; animation:titleBounce 2s infinite; }
@keyframes titleBounce {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-14px); }
}
.title-text { font-size:var(--font-xl); font-weight:800; color:var(--text); letter-spacing:3px; }
.title-sub { font-size:var(--font-sm); color:var(--text-light); }

.level-cards { display:flex; gap:22px; flex-wrap:wrap; justify-content:center; max-width:900px; width:100%; }
.level-card {
  flex:1; min-width:200px; max-width:280px;
  background:var(--card); border-radius:28px;
  padding:30px 22px 26px; text-align:center; cursor:pointer;
  box-shadow:var(--shadow); transition:transform 0.18s cubic-bezier(0.68,-0.55,0.265,1.55), box-shadow 0.18s;
  position:relative; overflow:hidden;
}
.level-card:active { transform:scale(1.06); box-shadow:var(--shadow-lg); }
.level-card .card-icon { font-size:76px; display:block; margin-bottom:14px; }
.level-card .card-title { font-size:var(--font-lg); font-weight:700; color:var(--text); }
.level-card .card-hint { font-size:var(--font-sm); color:var(--text-light); margin-top:2px; }
.level-card .card-top { height:10px; position:absolute; top:0;left:0;right:0; border-radius:28px 28px 0 0; }
.level-card:nth-child(1) .card-top { background:linear-gradient(135deg,var(--yellow),#FFE88C); }
.level-card:nth-child(2) .card-top { background:linear-gradient(135deg,var(--blue),#80B8FF); }
.level-card:nth-child(3) .card-top { background:linear-gradient(135deg,var(--pink),#FF9DC4); }

/* ===== GAME SCREEN ===== */
.game-bg { position:absolute; inset:0; background:linear-gradient(180deg,#FFF9E6 0%,#FFF3D6 100%); z-index:-1; }
.top-bar {
  width:100%; max-width:800px; display:flex; align-items:center;
  justify-content:space-between; padding:14px 18px;
}
.back-btn, .volume-btn {
  width:50px; height:50px; border-radius:50%; border:none;
  background:var(--card); box-shadow:var(--shadow);
  font-size:26px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:transform 0.15s cubic-bezier(0.68,-0.55,0.265,1.55);
}
.back-btn:active, .volume-btn:active { transform:scale(1.1); }

.progress-dots { display:flex; gap:8px; align-items:center; }
.progress-dot {
  width:16px; height:16px; border-radius:50%;
  background:#E8E0D5; transition:all 0.3s cubic-bezier(0.68,-0.55,0.265,1.55);
}
.progress-dot.done { background:var(--green); transform:scale(1.15); }
.progress-dot.current { background:var(--yellow); transform:scale(1.45); box-shadow:0 0 14px rgba(255,217,61,0.55); }

.step-title-area { text-align:center; margin-bottom:14px; }
.step-number { font-size:var(--font-sm); color:var(--text-light); font-weight:600; letter-spacing:2px; }
.step-instruction { font-size:var(--font-lg); font-weight:700; color:var(--text); margin-top:2px; }
.replay-btn {
  display:inline-flex; align-items:center; gap:6px;
  margin-top:10px; padding:10px 22px;
  background:linear-gradient(180deg,#FFFFFF 0%,#FFF5F0 100%);
  border:2px solid rgba(255,107,157,0.2); border-radius:50px;
  font-size:15px; font-weight:700; color:var(--pink); cursor:pointer;
  box-shadow:0 3px 0 rgba(255,107,157,0.15), 0 4px 12px rgba(0,0,0,0.04);
  transition:transform 0.15s cubic-bezier(0.68,-0.55,0.265,1.55);
}
.replay-btn:active { transform:scale(1.1); }
.next-step-btn {
  display:none; margin-top:12px; padding:14px 36px;
  background:linear-gradient(180deg,var(--green),#4CAF50);
  color:white; border:none; border-radius:50px;
  font-size:18px; font-weight:800; cursor:pointer;
  box-shadow:0 6px 0 #388E3C, 0 8px 20px rgba(107,203,119,0.4);
  transition:transform 0.15s cubic-bezier(0.68,-0.55,0.265,1.55);
  animation:nextBtnPulse 0.8s ease-in-out infinite;
}
.next-step-btn.show { display:inline-flex; align-items:center; gap:8px; }
.next-step-btn:active { transform:scale(1.1) translateY(2px); box-shadow:0 3px 0 #388E3C, 0 4px 12px rgba(107,203,119,0.3); }
@keyframes nextBtnPulse {
  0%,100% { box-shadow:0 6px 0 #388E3C, 0 8px 20px rgba(107,203,119,0.4); }
  50% { box-shadow:0 6px 0 #388E3C, 0 8px 32px rgba(107,203,119,0.7); }
}

/* ===== INTERACTION AREA ===== */
.interaction-area {
  flex:1; width:100%; max-width:750px;
  background:var(--card); border-radius:28px;
  box-shadow:var(--shadow); position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  min-height:310px;
}
.interaction-area.success { box-shadow:0 0 0 7px var(--green), var(--shadow-lg); }
.interaction-area.wrong { animation:headShake 0.5s ease; }
@keyframes headShake {
  0%,100% { transform:translateX(0); }
  15% { transform:translateX(-8px) rotate(-2deg); }
  30% { transform:translateX(8px) rotate(2deg); }
  45% { transform:translateX(-6px) rotate(-1deg); }
  60% { transform:translateX(6px) rotate(1deg); }
  75% { transform:translateX(-3px); }
}
.error-bubble {
  position:absolute; z-index:30; pointer-events:none;
  background:white; border-radius:20px; padding:8px 16px;
  font-size:28px; font-weight:700; color:var(--text);
  box-shadow:0 4px 16px rgba(0,0,0,0.1);
  animation:bubblePop 0.8s ease-out both;
}
.error-bubble::after {
  content:''; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
  width:0; height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-top:12px solid white;
}
@keyframes bubblePop {
  0% { opacity:0; transform:translateY(10px) scale(0.5); }
  30% { opacity:1; transform:translateY(-5px) scale(1.1); }
  100% { opacity:0; transform:translateY(-30px) scale(1); }
}

.scene { position:relative; width:100%; height:100%; }
.scene-bg { position:absolute; inset:0; z-index:0; width:100%; height:100%; }
.step-stage { position:absolute; inset:0; z-index:1; }
.step-stage.enter { animation:stageIn 0.45s ease-out both; }
.step-stage.exit { animation:stageOut 0.25s ease-in both; }
@keyframes stageIn {
  from { opacity:0; transform:translateY(14px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes stageOut {
  from { opacity:1; transform:translateY(0); }
  to { opacity:0; transform:translateY(-10px); }
}

/* ===== ARROW GUIDANCE ===== */
.arrow-badge {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  pointer-events:none;
}
.arrow-label {
  font-size:16px; font-weight:700; color:var(--pink);
  background:rgba(255,255,255,0.96); padding:8px 20px;
  border-radius:22px; white-space:nowrap;
  box-shadow:0 3px 14px rgba(255,107,157,0.2), 0 1px 3px rgba(0,0,0,0.04);
  letter-spacing:0.5px;
}
.anim-up { animation:slideUp 1.2s ease-in-out infinite; }
.anim-down { animation:slideDown 1.2s ease-in-out infinite; }
.anim-left { animation:slideLeft 1.2s ease-in-out infinite; }
.anim-right { animation:slideRight 1.2s ease-in-out infinite; }

@keyframes slideUp {
  0%,100% { transform:translateY(0) scale(1); opacity:0.4; }
  50% { transform:translateY(-30px) scale(1.06); opacity:1; }
}
@keyframes slideDown {
  0%,100% { transform:translateY(0) scale(1); opacity:0.4; }
  50% { transform:translateY(30px) scale(1.06); opacity:1; }
}
@keyframes slideLeft {
  0%,100% { transform:translateX(0) scale(1); opacity:0.4; }
  50% { transform:translateX(-30px) scale(1.06); opacity:1; }
}
@keyframes slideRight {
  0%,100% { transform:translateX(0) scale(1); opacity:0.4; }
  50% { transform:translateX(30px) scale(1.06); opacity:1; }
}

.tap-ring {
  width:90px; height:90px; border-radius:50%;
  border:5px solid var(--yellow);
  box-shadow:0 0 28px rgba(255,217,61,0.5), 0 0 56px rgba(255,217,61,0.18);
  animation:tapPulse 1s ease-in-out infinite;
}
@keyframes tapPulse {
  0%,100% { transform:scale(0.65); opacity:0.3; }
  50% { transform:scale(1.2); opacity:1; }
}

/* ===== DRAGGABLE ITEMS ===== */
.draggable-item {
  cursor: grab; transition: transform 0.1s;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
}
.draggable-item:active { cursor: grabbing; }
.draggable-item.dragging {
  transform: scale(1.08);
  filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3));
  z-index: 50 !important;
}
.draggable-item.snap-back {
  transition: all 0.4s ease-out;
}
.drag-target { position: relative; }
.drag-target::after {
  content: ''; position: absolute; inset: -10px;
  border: 5px dashed var(--yellow); border-radius: 22px;
  animation: targetPulse 1.0s ease-in-out infinite;
  pointer-events: none; z-index: 25;
}
@keyframes targetPulse {
  0%,100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}
.drop-zone {
  position: absolute; z-index: 8; pointer-events: none;
  border: 5px solid var(--pink); border-radius: 22px;
  background: rgba(255,107,157,0.15);
  box-shadow: 0 0 28px rgba(255,107,157,0.4), inset 0 0 20px rgba(255,107,157,0.08);
  animation: zoneGlow 0.9s ease-in-out infinite;
}
@keyframes zoneGlow {
  0%,100% { border-color: var(--pink); box-shadow: 0 0 20px rgba(255,107,157,0.3), inset 0 0 14px rgba(255,107,157,0.04); }
  50% { border-color: #FF4080; box-shadow: 0 0 40px rgba(255,107,157,0.6), inset 0 0 26px rgba(255,107,157,0.14); }
}
.drop-zone-label {
  position: absolute; top: -36px; left: 50%; transform: translateX(-50%);
  background:linear-gradient(180deg,var(--pink),#FF4080); color: white; font-size: 14px; font-weight: 700;
  padding: 5px 16px; border-radius: 22px; white-space: nowrap;
  z-index: 9; pointer-events: none;
  box-shadow: 0 4px 14px rgba(255,107,157,0.4);
  animation: zoneGlow 0.9s ease-in-out infinite;
}
.drag-target.invisible-target {
  background: rgba(255,217,61,0.1);
  border: 3px solid rgba(255,217,61,0.5);
  border-radius: 20px;
}
.drag-target.invisible-target::after { inset: -6px; border-width: 3px; }

/* ===== PARENT RECORDS PANEL ===== */
.parent-entry {
  position: absolute; bottom: 24px; right: 28px; z-index: 10;
  width: 48px; height: 48px; border-radius: 50%;
  background:linear-gradient(180deg,#FFFFFF 0%,#FFF5F0 100%);
  border: 2px solid rgba(155,123,107,0.2); font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow:0 3px 0 rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
  transition: transform 0.15s cubic-bezier(0.68,-0.55,0.265,1.55);
}
.parent-entry:active { transform:scale(1.1); }
.records-overlay {
  position: fixed; inset: 0; z-index: 120;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.4); opacity: 0; pointer-events: none; transition: opacity 0.35s;
}
.records-overlay.active { opacity: 1; pointer-events: auto; }
.records-panel {
  background: #FFFFFF; border-radius: 28px;
  padding: 36px 30px 24px; text-align: center;
  box-shadow: var(--shadow-lg); animation: slideInUp 0.45s ease;
  max-width: 400px; width: 90%;
}
.records-title { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.records-hint { font-size: 13px; color: var(--text-light); margin-bottom: 20px; }
.level-record {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; margin-bottom: 10px;
  background: #FFF9F3; border-radius: 20px; text-align: left;
}
.level-record .rec-icon { font-size: 36px; flex-shrink: 0; }
.level-record .rec-info { flex: 1; }
.level-record .rec-name { font-size: 17px; font-weight: 700; color: var(--text); }
.level-record .rec-detail { font-size: 13px; color: var(--text-light); margin-top: 2px; }
.level-record .rec-count {
  font-size: 28px; font-weight: 800; color: var(--yellow);
  flex-shrink: 0; min-width: 36px; text-align: center;
}
.record-empty { padding: 24px; color: var(--text-light); font-size: 15px; }
.records-btns { display: flex; gap: 10px; margin-top: 18px; justify-content: center; }
.records-btn {
  padding: 12px 28px; border-radius: 50px; border: none;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: transform 0.15s cubic-bezier(0.68,-0.55,0.265,1.55);
}
.records-btn:active { transform:scale(1.1); }
.records-btn.close {
  background:linear-gradient(180deg,var(--yellow),#FFC107);
  color:var(--text); box-shadow:0 4px 0 #E6A800, 0 6px 16px rgba(255,217,61,0.35);
}
.records-btn.clear { background: #F5F0EB; color: var(--text-light); box-shadow:0 3px 0 rgba(0,0,0,0.06); }

/* ===== ANIMATIONS ===== */
@keyframes floatUp {
  0% { transform:translateY(0) scale(1); opacity:1; }
  100% { transform:translateY(-160px) scale(0.2) rotate(45deg); opacity:0; }
}
@keyframes confettiFall {
  0% { transform:translateY(-100%) rotate(0deg); opacity:1; }
  100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
}
@keyframes slideInUp {
  from { transform:translateY(40px); opacity:0; }
  to { transform:translateY(0); opacity:1; }
}

/* ===== CELEBRATION ===== */
.celebration-overlay {
  position:fixed; inset:0; z-index:100;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.45); opacity:0; pointer-events:none; transition:opacity 0.4s;
}
.celebration-overlay.active { opacity:1; pointer-events:auto; }
.celebration-card {
  background:white; border-radius:28px;
  padding:44px 36px; text-align:center;
  box-shadow:var(--shadow-lg); animation:slideInUp 0.5s ease;
  max-width:420px; width:90%;
}
.celebration-emoji { font-size:90px; display:block; margin-bottom:14px; animation:titleBounce 0.8s ease infinite; }
.celebration-title { font-size:var(--font-xl); font-weight:800; color:var(--text); }
.celebration-sub { font-size:var(--font-md); color:var(--text-light); margin-top:6px; }
.celebration-stars { font-size:34px; letter-spacing:8px; margin:14px 0; }
.celebration-btn {
  margin-top:22px; padding:16px 44px; font-size:var(--font-md); font-weight:700;
  background:linear-gradient(180deg,var(--yellow),#FFC107); color:var(--text);
  border:none; border-radius:50px; cursor:pointer;
  box-shadow:0 6px 0 #E6A800, 0 8px 20px rgba(255,217,61,0.4);
  transition:transform 0.15s cubic-bezier(0.68,-0.55,0.265,1.55);
}
.celebration-btn:active { transform:scale(1.1) translateY(2px); box-shadow:0 3px 0 #E6A800, 0 4px 12px rgba(255,217,61,0.3); }
.particle {
  position:fixed; z-index:101; pointer-events:none;
  font-size:30px; animation:floatUp 1.2s ease-out forwards;
}
.confetti-piece {
  position:fixed; z-index:102; pointer-events:none;
  width:12px; height:12px; border-radius:4px; animation:confettiFall 2.6s ease-in forwards;
}

/* Canvas confetti layer */
#confetti-canvas { position:fixed; inset:0; z-index:103; pointer-events:none; }

@media (max-width:640px) {
  .level-cards { flex-direction:column; align-items:center; gap:16px; }
  .level-card { max-width:100%; width:100%; padding:22px 18px; }
  .level-card .card-icon { font-size:54px; }
  .interaction-area { min-height:260px; }
  .title-icon { font-size:50px; }
}
@media (min-width:1024px) {
  .interaction-area { min-height:380px; }
}
</style>
</head>
<body>

<!-- Decorative elements -->
<div class="deco-clouds">
  <div class="cloud"></div><div class="cloud"></div><div class="cloud"></div>
</div>

/* ================================================================
   AUDIO
   ================================================================ */
function initAudio() {
  if (state.audioCtx) return;
  try { state.audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
  catch(e) { state.audioCtx = null; }
}

function playTone(freq, dur, type, vol) {
  type=type||'sine'; vol=vol||0.12;
  if (!state.audioCtx||state.muted) return;
  try {
    const o=state.audioCtx.createOscillator(), g=state.audioCtx.createGain();
    o.type=type; o.frequency.setValueAtTime(freq, state.audioCtx.currentTime);
    g.gain.setValueAtTime(vol, state.audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, state.audioCtx.currentTime+dur);
    o.connect(g); g.connect(state.audioCtx.destination);
    o.start(); o.stop(state.audioCtx.currentTime+dur);
  } catch(e) {}
}
function playSuccessSound() {
  // "叮✨" — bright two-tone chime
  playTone(880,0.1,'sine',0.13); setTimeout(()=>playTone(1100,0.22,'sine',0.11),80);
}
function playWrongSound() {
  // "啵" — short gentle pop
  playTone(330,0.08,'sine',0.1); setTimeout(()=>playTone(260,0.12,'sine',0.07),50);
}
function playCelebrationSound() {
  // "耶🎉" — cheerful ascending arpeggio
  [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>playTone(f,0.15,'sine',0.1),i*80));
}

let currentAudio = null;

function speak(text, onEnd) {
  if (state.muted) { if(onEnd) onEnd(); return; }
  // Stop any currently playing audio
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  const file = VOICE_MAP[text];
  if (file) {
    const audio = new Audio(file);
    currentAudio = audio;
    audio.onended = () => { currentAudio = null; if (onEnd) onEnd(); };
    audio.onerror = () => { currentAudio = null; if (onEnd) onEnd(); };
    audio.play().catch(() => { currentAudio = null; if (onEnd) onEnd(); });
  } else {
    // Fallback: text not in VOICE_MAP — do nothing
    if (onEnd) onEnd();
  }
}

function toggleMute() {
  state.muted = !state.muted;
  document.getElementById('volume-btn').textContent = state.muted?'🔇':'🔊';
  if (state.muted && currentAudio) { currentAudio.pause(); currentAudio = null; }
}

function replayVoice() {
  if (state.currentLevel < 0) return;
  const step = LEVELS[state.currentLevel].steps[state.currentStep];
  if (step && step.voice) speak(step.voice);
}

/* ================================================================
   UI
   ================================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id); if(el) el.classList.add('active');
}
function goHome() {
  if(currentAudio) { currentAudio.pause(); currentAudio = null; }
  state.currentLevel=-1; state.currentStep=0; state.stepCompleted=new Set();
  showScreen('start-screen');
}
function startLevel(idx) {
  initAudio();
  state.currentLevel=idx; state.currentStep=0; state.stepCompleted=new Set();
  showScreen('game-screen'); renderProgressDots(); loadStep(0);
}
function renderProgressDots() {
  const total=LEVELS[state.currentLevel].steps.length;
  let h='';
  for(let i=0;i<total;i++) {
    let cls='progress-dot';
    if(state.stepCompleted.has(i)) cls+=' done';
    if(i===state.currentStep) cls+=' current';
    h+=`<div class="${cls}"></div>`;
  }
  document.getElementById('progress-dots').innerHTML=h;
}

/* ================================================================
   LOAD STEP
   ================================================================ */
function loadStep(idx) {
  state.currentStep=idx;
  // Abort previous step's gesture listeners immediately
  if (state.stepAbortController) { state.stepAbortController.abort(); state.stepAbortController=null; }
  // Hide next-step button
  const nextBtn = document.getElementById('next-step-btn');
  if (nextBtn) nextBtn.classList.remove('show');
  const level=LEVELS[state.currentLevel], step=level.steps[idx];
  document.getElementById('step-number-label').textContent=`第 ${step.id} 步 / 共 7 步`;
  document.getElementById('step-instruction').textContent=step.instruction;
  renderProgressDots();
  const scene=document.getElementById('scene'), area=document.getElementById('interaction-area');
  area.classList.remove('success','wrong');

  // Persistent background — set once per level
  if (!scene.dataset.levelId || scene.dataset.levelId !== level.id) {
    scene.dataset.levelId = level.id;
    scene.innerHTML = level.id === 'dress'
      ? `<div class="scene-bg" style="background:linear-gradient(180deg,#FFF3E8 0%,#FFECD8 55%,#FFE4CC 100%);"></div>`
      : `<img class="scene-bg" src="bathroom-bg.png?v=2" draggable="false" style="object-fit:cover;-webkit-touch-callout:none;" alt="">`;
  }

  // Remove old stage with exit animation
  const oldStage = scene.querySelector('.step-stage');
  const newHTML = buildScene(level.id, step);
  const wrapper = document.createElement('div');
  wrapper.innerHTML = newHTML;
  const newStage = wrapper.firstElementChild;

  function swapStage() {
    if (oldStage) oldStage.remove();
    scene.appendChild(newStage);
    requestAnimationFrame(() => {
      newStage.classList.add('enter');
      newStage.addEventListener('animationend', function h() {
        newStage.removeEventListener('animationend', h);
        newStage.classList.remove('enter');
      }, {once: true});
    });
    state.gesturePoints=[]; state.isGestureActive=false;
    attachGestureListeners(step, area);
  }

  if (oldStage) {
    oldStage.classList.add('exit');
    oldStage.addEventListener('animationend', function h() {
      oldStage.removeEventListener('animationend', h);
      swapStage();
    }, {once: true});
  } else {
    swapStage();
  }

  setTimeout(()=>speak(step.voice), 350);
}

    <div class="arrow-badge" style="position:absolute;top:${parseFloat(top)+98}px;left:${parseFloat(left)-15}px;z-index:20;pointer-events:none;"><span class="arrow-label">${label}</span></div>`;
  }
  if (type==='up') return badge('anim-up', arrUp());
  if (type==='down') return badge('anim-down', arrDown());
  if (type==='left') return badge('anim-left', arrLeft());

  return '';

/* ================================================================
   GESTURE DETECTION
   ================================================================ */
function attachGestureListeners(step, area) {
  // Abort previous step's listeners
  if (state.stepAbortController) state.stepAbortController.abort();
  const ac = new AbortController();
  state.stepAbortController = ac;
  const {signal} = ac;

  const expected = step.gesture;

  // Drag state
  let dragItem = null;
  let dragStartLeft = 0, dragStartTop = 0;
  let touchOffsetX = 0, touchOffsetY = 0;

  if (expected === 'drag') {
    const item = area.querySelector('.draggable-item');
    const target = area.querySelector('.drag-target');
    if (item) {
      const itemRect = item.getBoundingClientRect();
      const areaRect = area.getBoundingClientRect();
      item.style.position = 'absolute';
      item.style.left = (itemRect.left - areaRect.left) + 'px';
      item.style.top = (itemRect.top - areaRect.top) + 'px';
      item.style.right = 'auto';
      item.style.bottom = 'auto';
      item._origLeft = parseFloat(item.style.left);
      item._origTop = parseFloat(item.style.top);
    }
  }

  area.addEventListener('touchstart', e => {
    initAudio();
    const t = e.touches[0];

    if (expected === 'drag') {
      const item = area.querySelector('.draggable-item');
      if (item) {
        const ir = item.getBoundingClientRect();
        const margin = 30;
        if (t.clientX >= ir.left - margin && t.clientX <= ir.right + margin &&
            t.clientY >= ir.top - margin && t.clientY <= ir.bottom + margin) {
          dragItem = item;
          touchOffsetX = t.clientX - ir.left;
          touchOffsetY = t.clientY - ir.top;
          item.classList.add('dragging');
          item.classList.remove('snap-back');
          item.style.transition = 'none';
          state.isGestureActive = true;
          e.preventDefault();
          return;
        }
      }
    }

    state.gestureStartX = t.clientX; state.gestureStartY = t.clientY;
    state.gesturePoints = [{x:t.clientX, y:t.clientY}];
    state.isGestureActive = true;
    e.preventDefault();
  }, {signal, passive:false});

  area.addEventListener('touchmove', e => {
    if (!state.isGestureActive) return;

    if (dragItem) {
      const t = e.touches[0];
      const areaRect = area.getBoundingClientRect();
      let newLeft = t.clientX - areaRect.left - touchOffsetX;
      let newTop = t.clientY - areaRect.top - touchOffsetY;
      newLeft = Math.max(0, Math.min(newLeft, areaRect.width - dragItem.offsetWidth));
      newTop = Math.max(0, Math.min(newTop, areaRect.height - dragItem.offsetHeight));
      dragItem.style.left = newLeft + 'px';
      dragItem.style.top = newTop + 'px';
      e.preventDefault();
      return;
    }

    state.gesturePoints.push({x:e.touches[0].clientX, y:e.touches[0].clientY});
    e.preventDefault();
  }, {signal, passive:false});

  area.addEventListener('touchend', e => {
    if (!state.isGestureActive) return;
    state.isGestureActive = false;

    if (dragItem) {
      dragItem.classList.remove('dragging');
      const target = area.querySelector('.drag-target');
      if (target) {
        const ir = dragItem.getBoundingClientRect();
        const tr = target.getBoundingClientRect();
        const overlapX = Math.max(0, Math.min(ir.right, tr.right) - Math.max(ir.left, tr.left));
        const overlapY = Math.max(0, Math.min(ir.bottom, tr.bottom) - Math.max(ir.top, tr.top));
        const overlapArea = overlapX * overlapY;
        const itemArea = ir.width * ir.height;
        const ratio = overlapArea / itemArea;

        if (ratio > 0.35) {
          handleStepSuccess(area);
          dragItem = null;
          return;
        }
      }
      dragItem.classList.add('snap-back');
      dragItem.style.left = dragItem._origLeft + 'px';
      dragItem.style.top = dragItem._origTop + 'px';
      dragItem = null;
      handleStepWrong(area);
      return;
    }

    const pts = state.gesturePoints;
    if (pts.length === 0) return;
    const last = pts[pts.length-1];
    const dx = last.x - state.gestureStartX, dy = last.y - state.gestureStartY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    let det;
    if (dist < 18) { det = 'tap'; }
    else if (Math.abs(dx) > Math.abs(dy)) { det = dx > 0 ? 'swipe-right' : 'swipe-left'; }
    else { det = dy > 0 ? 'swipe-down' : 'swipe-up'; }
    if (checkMatch(det, expected)) { handleStepSuccess(area); }
    else { handleStepWrong(area); }
  }, {signal});

  // Mouse fallback
  area.addEventListener('mousedown', e => {
    initAudio();
    if (expected === 'drag') {
      const item = area.querySelector('.draggable-item');
      if (item) {
        const ir = item.getBoundingClientRect();
        const margin = 30;
        if (e.clientX >= ir.left - margin && e.clientX <= ir.right + margin &&
            e.clientY >= ir.top - margin && e.clientY <= ir.bottom + margin) {
          dragItem = item;
          touchOffsetX = e.clientX - ir.left;
          touchOffsetY = e.clientY - ir.top;
          item.classList.add('dragging');
          item.classList.remove('snap-back');
          item.style.transition = 'none';
          state.isGestureActive = true;
          return;
        }
      }
    }
    state.gestureStartX = e.clientX; state.gestureStartY = e.clientY;
    state.gesturePoints = [{x:e.clientX, y:e.clientY}];
    state.isGestureActive = true;
  }, {signal});
  area.addEventListener('mousemove', e => {
    if (!state.isGestureActive) return;
    if (dragItem) {
      const areaRect = area.getBoundingClientRect();
      let newLeft = e.clientX - areaRect.left - touchOffsetX;
      let newTop = e.clientY - areaRect.top - touchOffsetY;
      newLeft = Math.max(0, Math.min(newLeft, areaRect.width - dragItem.offsetWidth));
      newTop = Math.max(0, Math.min(newTop, areaRect.height - dragItem.offsetHeight));
      dragItem.style.left = newLeft + 'px';
      dragItem.style.top = newTop + 'px';
      return;
    }
    state.gesturePoints.push({x:e.clientX, y:e.clientY});
  }, {signal});
  area.addEventListener('mouseup', e => {
    if (!state.isGestureActive) return;
    state.isGestureActive = false;
    if (dragItem) {
      dragItem.classList.remove('dragging');
      const target = area.querySelector('.drag-target');
      if (target) {
        const ir = dragItem.getBoundingClientRect();
        const tr = target.getBoundingClientRect();
        const overlapX = Math.max(0, Math.min(ir.right, tr.right) - Math.max(ir.left, tr.left));
        const overlapY = Math.max(0, Math.min(ir.bottom, tr.bottom) - Math.max(ir.top, tr.top));
        if ((overlapX * overlapY) / (ir.width * ir.height) > 0.35) {
          handleStepSuccess(area);
          dragItem = null;
          return;
        }
      }
      dragItem.classList.add('snap-back');
      dragItem.style.left = dragItem._origLeft + 'px';
      dragItem.style.top = dragItem._origTop + 'px';
      dragItem = null;
      handleStepWrong(area);
      return;
    }
    const pts = state.gesturePoints;
    const last = pts[pts.length-1];
    const dx = last.x - state.gestureStartX, dy = last.y - state.gestureStartY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    let det;
    if (dist < 18) { det = 'tap'; }
    else if (Math.abs(dx) > Math.abs(dy)) { det = dx > 0 ? 'swipe-right' : 'swipe-left'; }
    else { det = dy > 0 ? 'swipe-down' : 'swipe-up'; }
    if (checkMatch(det, expected)) { handleStepSuccess(area); }
    else { handleStepWrong(area); }
  }, {signal});
}

function checkMatch(det, exp) {
  if(exp==='drag') return det==='drag'; // drag is handled separately, this is fallback
  if(exp==='tap') return det==='tap';
  if(exp==='swipe-up') return det==='swipe-up'||det==='swipe-down';
  if(exp==='swipe-down') return det==='swipe-down'||det==='swipe-up';
  if(exp==='swipe-left') return det==='swipe-left'||det==='swipe-right';
  if(exp==='swipe-right') return det==='swipe-right'||det==='swipe-left';
  if(exp==='swipe-vertical') return det==='swipe-up'||det==='swipe-down';
  if(exp==='swipe-horizontal') return det==='swipe-left'||det==='swipe-right';
  return true;
}

/* ================================================================
   STEP RESULTS
   ================================================================ */
function handleStepSuccess(area) {
  const level=LEVELS[state.currentLevel];
  state.stepCompleted.add(state.currentStep);
  area.classList.add('success'); playSuccessSound();
  const p=['太棒了！做得真好！','真厉害！继续加油！','非常好！你真聪明！','好棒哦！就是这样！','太好了！给你点赞！'];
  speak(p[Math.floor(Math.random()*p.length)]);
  spawnParticles(8); renderProgressDots();
  // Show "next step" button instead of auto-advancing
  const btn = document.getElementById('next-step-btn');
  if (btn) {
    if (state.currentStep < level.steps.length - 1) {
      btn.textContent = '✅ 下一步';
    } else {
      btn.textContent = '🎉 完成关卡';
    }
    btn.classList.add('show');
  }
}

function goNextStep() {
  const btn = document.getElementById('next-step-btn');
  if (btn) btn.classList.remove('show');
  const area = document.getElementById('interaction-area');
  area.classList.remove('success');
  const level = LEVELS[state.currentLevel];
  if (state.currentStep < level.steps.length - 1) {
    loadStep(state.currentStep + 1);
  } else {
    handleLevelComplete();
  }
}

function handleStepWrong(area) {
  area.classList.add('wrong'); playWrongSound();
  // Error bubble "?"
  const bubble = document.createElement('div');
  bubble.className = 'error-bubble';
  bubble.textContent = '？';
  const areaRect = area.getBoundingClientRect();
  bubble.style.left = (areaRect.width/2 - 20) + 'px';
  bubble.style.top = (areaRect.height/2 - 60) + 'px';
  area.appendChild(bubble);
  setTimeout(()=>bubble.remove(), 800);
  const e=['没关系，再试一次哦！','差一点点，再来一次吧！','加油，你可以的！再试试看。','慢慢来，不着急，再试一次。'];
  speak(e[Math.floor(Math.random()*e.length)]);
  setTimeout(()=>area.classList.remove('wrong'), 600);
}

function handleLevelComplete() {
  const level=LEVELS[state.currentLevel]; playCelebrationSound();
  saveRecord(level.id, level.name, level.icon);
  document.getElementById('celebration-title').textContent=`${level.icon} ${level.name}完成啦！`;
  document.getElementById('celebration-sub').textContent='你真的太厉害了！';
  document.getElementById('celebration').classList.add('active');
  spawnCanvasConfetti();
  speak(`太厉害了！你已经学会${level.name}了！`);
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('active'); goHome();
}

/* ================================================================
   EFFECTS
   ================================================================ */
function spawnParticles(count) {
  // Golden spinning stars from center
  const c = document.getElementById('particles-container');
  for (let i=0; i<count; i++) {
    const p = document.createElement('span'); p.className = 'particle';
    p.textContent = '⭐';
    p.style.left = '50%'; p.style.top = '50%';
    p.style.fontSize = (24 + Math.random()*18) + 'px';
    const angle = Math.random()*Math.PI*2;
    const dist = 60 + Math.random()*120;
    p.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle)*dist - 60 + 'px');
    p.style.animation = `starBurst ${1+Math.random()*1.2}s ease-out forwards`;
    p.style.animationDelay = Math.random()*0.15+'s';
    c.appendChild(p); setTimeout(()=>p.remove(), 1800);
  }
}

// Inject starBurst keyframe
(function(){
  if (!document.getElementById('star-burst-kf')) {
    const sheet = document.createElement('style');
    sheet.id = 'star-burst-kf';
    sheet.textContent = `@keyframes starBurst {
      0% { opacity:1; transform:translate(0,0) scale(0.3) rotate(0deg); }
      100% { opacity:0; transform:translate(var(--dx),var(--dy)) scale(1.2) rotate(360deg); }
    }`;
    document.head.appendChild(sheet);
  }
})();

function spawnCanvasConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#FFD93D','#FF6B9D','#4D96FF','#6BCB77','#FF9DC4','#80B8FF','#FFE88C'];
  const particles = [];
  for (let i=0; i<120; i++) {
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height - canvas.height,
      w: 8+Math.random()*10, h: 6+Math.random()*8,
      color: colors[Math.floor(Math.random()*colors.length)],
      vx: (Math.random()-0.5)*3, vy: 2+Math.random()*5,
      rot: Math.random()*360, rotV: (Math.random()-0.5)*8,
      opacity: 0.8+Math.random()*0.2
    });
  }
  let startTime = performance.now();
  function animate(ts) {
    const elapsed = ts - startTime;
    if (elapsed > 2500) { ctx.clearRect(0,0,canvas.width,canvas.height); return; }
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (const p of particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.opacity * (1 - elapsed/2500));
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.rot += p.rotV;
      p.vy += 0.04;
    }
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

// Init
(function(){
  window.addEventListener('load', ()=>{
    setTimeout(()=>{
      const ls = document.getElementById('loading-screen');
      if(ls) ls.classList.add('hidden');
    }, 500);
  });
  let welcomed=false;
  document.addEventListener('click',()=>{if(!welcomed){welcomed=true;initAudio();}},{once:false});
})();
</script>
